
<!DOCTYPE html>
<html lang="es" class="light">
<head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fremtec - Energía Solar Argentina</title>
    <meta name="description" content="Fremtec ofrece soluciones fotovoltaicas residenciales e industriales en Argentina, con asesoramiento experto y cálculo de eficiencia energética para maximizar tu ahorro." />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph básico para compartir en redes -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fremtec - Energía Solar Argentina" />
    <meta property="og:description" content="Soluciones fotovoltaicas para hogares y empresas en Argentina, diseñadas para optimizar tu consumo energético y tu ahorro." />

    <!-- Datos estructurados para buscadores (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Fremtec - Energía Solar Argentina",
      "description": "Instalación de paneles solares en Argentina para hogares y empresas. Sistemas on-grid, híbridos y off-grid a medida.",
      "url": "https://www.fremtec.com.ar",
      "areaServed": { "@type": "Country", "name": "Argentina" },
      "serviceType": ["Instalación de paneles solares", "Energía solar residencial", "Energía solar industrial", "Sistemas fotovoltaicos"]
    }
    </script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#36aba1", // Teal
                        "secondary": "#fbc02d", // Yellow
                        "background-dark": "#0a1a1a",
                    },
                    fontFamily: {
                        "display": ["Barlow", "sans-serif"],
                        "body": ["Barlow", "sans-serif"],
                    }
                },
            },
        }
    </script>
    <style>
        body { 
            font-family: 'Barlow', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f8fafd; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Barlow', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .logo-text { color: #36aba1; letter-spacing: 0.25em; font-family: 'Barlow', sans-serif; font-weight: 200; }
        .decor-circle { position: absolute; border: 1px solid rgba(251, 192, 45, 0.3); border-radius: 50%; pointer-events: none; }
        
        /* Animación de entrada para elementos de marca */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-brand-entry { animation: fadeInDown 0.8s ease-out forwards; }

        /* Animación para transiciones de página */
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-page-entry { 
            animation: pageFadeIn 0.5s cubic-bezier(0.21, 0.6, 0.35, 1) forwards;
            will-change: transform, opacity;
        }

        /* Animación de rebote suave para el scroll indicator */
        @keyframes bounceSlow {
            0%, 100% { transform: translateY(0) translateX(-50%); }
            50% { transform: translateY(-10px) translateX(-50%); }
        }
        .animate-bounce-slow { 
            animation: bounceSlow 2.5s ease-in-out infinite; 
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #36aba1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a8a81; }
    </style>
